services:
  - type: web
    name: osint-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: FILE_MAP_URL
        sync: false
      - key: INDEX_URL
        sync: false
