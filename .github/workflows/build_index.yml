name: Build Index

on:
  push:
    paths:
      - 'start_build.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download files via curl and build index
        run: |
          python -c "
          import csv, json, re, os, subprocess
          from pathlib import Path

          file_map = {
              'school_1.csv': '1N-sJV5GR5I-thsH9mjOAgPhyO8VYk29k',
              'school_3.csv': '1342Gl23P314oisuCn1hyAT2kXzpJ4L_i',
              'school_6.csv': '16bAziCf56Ykaw1njC2oVTXSFCoIhLyi_',
              'gosuslugi_1.csv': '1oqDrFeQLo6cou96I7S9h4FQ8ILUW4yd3',
              'moscow_1.txt': '1rkoXdEiX47BVuDJTqGyEfaLEgl5W5Q49',
              'Telegram_1.csv': '1gPxZxtv0WzJQB2wbPrSW9dp7cAzRQLMw',
              'Telegram_2.txt': '1CbYkhEMyChN_61qpa_szxumB6JtBBqGn',
              'Telegram_3.txt': '1rgq5ABpH2p3PoIBLYh5T980rYCrPYJMB',
              'Telegram_4.txt': '1Li4LjlbwxK5dOAUyp87U9AQe_CtDpnqv'
          }

          def clean_phone(raw):
              digits = re.sub(r'\D', '', raw)
              if len(digits) == 11 and digits[0] in ('7', '8'):
                  return digits[1:]
              return digits

          new_index = {}
          for fname, file_id in file_map.items():
              url = f'https://drive.google.com/uc?export=download&confirm=no_antivirus&id={file_id}'
              dest = Path(fname)
              print(f'Downloading {fname}...')
              ret = subprocess.run([
                  'curl', '-L', '-b', '/tmp/cookies.txt', '-c', '/tmp/cookies.txt',
                  '-o', str(dest), url
              ], capture_output=True, text=True)
              if ret.returncode != 0 or not dest.exists() or dest.stat().st_size == 0:
                  print(f'Failed to download {fname}, trying alternative...')
                  url2 = f'https://drive.google.com/uc?export=download&id={file_id}'
                  subprocess.run(['curl', '-L', '-b', '/tmp/cookies.txt', '-c', '/tmp/cookies.txt', '-o', str(dest), url2])
                  if not dest.exists() or dest.stat().st_size == 0:
                      print(f'Skipping {fname}')
                      continue
              print(f'Processing {fname}...')
              with open(dest, 'r', encoding='utf-8', errors='ignore') as f:
                  for line in f:
                      if line.strip():
                          digits = re.findall(r'\d+', line)
                          for d in digits:
                              cleaned = clean_phone(d)
                              if len(cleaned) >= 10:
                                  prefix = cleaned[:3]
                                  if prefix not in new_index:
                                      new_index[prefix] = []
                                  if fname not in new_index[prefix]:
                                      new_index[prefix].append(fname)
              os.remove(dest)

          with open('index.json', 'w', encoding='utf-8') as out:
              json.dump(new_index, out, ensure_ascii=False, indent=2)
          print(f'Index built with {len(new_index)} prefixes')
          "

      - name: Commit index.json to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add index.json
          git commit -m "Auto-generated index.json" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
